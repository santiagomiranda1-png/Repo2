<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LLM Frontend</title>
  <style>
    body{font-family:system-ui,Arial,Helvetica,sans-serif;margin:2rem}
    textarea{width:100%;height:120px;font-size:1rem}
    button{padding:.5rem 1rem;font-size:1rem}
    pre{background:#f6f8fa;padding:1rem;border-radius:6px}
  </style>
</head>
<body>
  <h1>Conectar con FastAPI LLM</h1>
  <p>Escribe un prompt y pulsa <strong>Enviar</strong>.</p>
  <textarea id="prompt" placeholder="Escribe tu prompt aquí..."></textarea>
  <div style="margin-top:.5rem">
    <button id="send">Enviar</button>
    <span id="status" style="margin-left:1rem;color:#666"></span>
  </div>
  <h2>Respuesta</h2>
  <pre id="output"></pre>
  <script src="./app.js"></script>
</body>
</html>
